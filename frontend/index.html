<!DOCTYPE html><html>
<head>
  <title>User Dropoff Predictor</title>
</head>
<body>  <h2>Customer Churn Prediction</h2><label>Tenure:</label>
<input type="number" id="tenure"><br><br>

<label>Monthly Charges:</label>
<input type="number" id="monthly"><br><br>

<label>Total Charges:</label>
<input type="number" id="total"><br><br>

<select id="senior">
  <option value="">Senior Citizen?</option>
  <option value="No">No</option>
  <option value="Yes">Yes</option>
</select><br><br>

<select id="partner">
  <option value="">Partner?</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select><br><br>

<select id="dependents">
  <option value="">Dependents?</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select><br><br>

<select id="phone">
  <option value="">Phone Service?</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select><br><br>

<select id="paperless">
  <option value="">Paperless Billing?</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select><br><br>

<button onclick="predict()">Predict</button>

  <h3 id="result"></h3>
  <script>
async function predict() {
  try {
    const data = {
      tenure: Number(document.getElementById("tenure").value),
      MonthlyCharges: Number(document.getElementById("monthly").value),
      TotalCharges: Number(document.getElementById("total").value),
      SeniorCitizen: Number(document.getElementById("senior").value),
      Partner: document.getElementById("partner").value,
      Dependents: document.getElementById("dependents").value,
      PhoneService: document.getElementById("phone").value,
      PaperlessBilling: document.getElementById("paperless").value
    };

    const response = await fetch("https://user-dropoff-risk-api-1.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
      "Prediction: " + result.churn_prediction +
      " | Probability: " + result.churn_probability;

  } catch (error) {
    document.getElementById("result").innerText =
      "Error: " + error.message;
  }
}
</script>


</body>
</html>
