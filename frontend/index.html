<!DOCTYPE html>
<html>
<head>
  <title>Churn Predictor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .bar-container {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      margin-top: 10px;
    }

    .bar {
      height: 12px;
      border-radius: 10px;
      background: green;
      width: 0%;
      text-align: center;
      color: white;
      font-size: 10px;
    }

    .loader {
      display: none;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Churn Predictor</h2>

  <input type="number" id="tenure" placeholder="Tenure">
  <input type="number" id="monthly" placeholder="Monthly Charges">
  <input type="number" id="total" placeholder="Total Charges">

  <!-- FIXED DROPDOWNS -->
  <select id="senior">
    <option value="">Select Senior Citizen</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <select id="partner">
    <option value="">Select Partner</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <select id="dependents">
    <option value="">Select Dependents</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <select id="phone">
    <option value="">Select Phone Service</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <select id="paperless">
    <option value="">Select Paperless Billing</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <button onclick="predict()">Predict</button>

  <div class="loader" id="loader">⏳ Predicting...</div>

  <h3 id="result"></h3>

  <div class="bar-container">
    <div class="bar" id="bar"></div>
  </div>

  <p style="text-align:center; margin-top:15px; font-size:12px; color:gray;">
    Built by Mohammed • Machine Learning Project
  </p>

</div>

<script>
async function predict() {

  const data = {
    tenure: Number(document.getElementById("tenure").value),
    MonthlyCharges: Number(document.getElementById("monthly").value),
    TotalCharges: Number(document.getElementById("total").value),
    SeniorCitizen: document.getElementById("senior").value,
    Partner: document.getElementById("partner").value,
    Dependents: document.getElementById("dependents").value,
    PhoneService: document.getElementById("phone").value,
    PaperlessBilling: document.getElementById("paperless").value
  };

  // ✅ VALIDATION
  if (!data.tenure || !data.MonthlyCharges || !data.TotalCharges ||
      data.SeniorCitizen === "" || data.Partner === "" ||
      data.Dependents === "" || data.PhoneService === "" ||
      data.PaperlessBilling === "") {

    alert("Please fill all fields");
    return;
  }

  document.getElementById("loader").style.display = "block";

  try {
    const response = await fetch("https://user-dropoff-risk-api-1.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("loader").style.display = "none";

    const prob = (result.churn_probability * 100).toFixed(1);

    let message = prob > 50
      ? "⚠️ High Risk of Churn"
      : "✅ Customer is unlikely to churn";

    document.getElementById("result").innerText =
      message + " (" + prob + "%)";

    const bar = document.getElementById("bar");
    bar.style.width = prob + "%";
    bar.innerText = prob + "%";

  } catch (error) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("result").innerText =
      "Error: " + error.message;
  }
}
</script>

</body>
</html>
